version: '3.8'

services:
  # MySQL Database
  mysql:
    image: mysql:8.0
    container_name: cyberxarena-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: cyberxarena
      MYSQL_USER: appuser
      MYSQL_PASSWORD: apppassword
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./src/main/resources/db_migration:/docker-entrypoint-initdb.d
    networks:
      - cyberxarena-network
    command: --default-authentication-plugin=mysql_native_password

  # Spring Boot Application
  app:
    build: .
    container_name: cyberxarena-app
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - DATABASE_URL=jdbc:mysql://mysql:3306/cyberxarena?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      - DATABASE_USERNAME=appuser
      - DATABASE_PASSWORD=apppassword
      - JWT_SECRET=mySecretKeyForDevelopment
      - JWT_EXPIRATION=86400000
    depends_on:
      - mysql
    networks:
      - cyberxarena-network
    volumes:
      - ./logs:/app/logs

  # Redis for caching (optional)
  redis:
    image: redis:7-alpine
    container_name: cyberxarena-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - cyberxarena-network

volumes:
  mysql_data:

networks:
  cyberxarena-network:
    driver: bridge
